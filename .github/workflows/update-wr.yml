name: Update WR

on:
  schedule:
    # 15時に実行
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-wr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      # GITHUB_TOKENを使ってPull Requestを作成するとtest-track.jsのworkflowが動かないので、GitHub Appのトークンを使うように。
      # https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md#push-pull-request-branches-to-a-fork
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ secrets.WR_UPDATE_GITHUB_APP_ID }}
          private-key: ${{ secrets.WR_UPDATE_GITHUB_APP_PRIVATE_KEY }}
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Install dependencies
        working-directory: wr-python
        run: |
          mise install
          uv sync --locked
      - name: Create track.js
        working-directory: wr-python
        run: uv run python ./src/wr_python/make_track_js.py
      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          add-paths: "src/const/track.js"
          commit-message: "feat(track.js): update WR"
          delete-branch: true
          title: Update WR
